<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif">
  <!-- Karten-Hintergrund -->
  <rect width="900" height="600" fill="#fafafa"/>
  <rect x="20" y="20" width="860" height="560" rx="8" fill="#fff" stroke="#e0e0e0"/>

  <!-- Titel -->
  <text x="40" y="55" font-size="18" font-weight="500" fill="#212121">Erdgeschoss</text>

  <!-- Floorplan-Bild-Bereich -->
  <rect x="40" y="75" width="820" height="490" rx="4" fill="#f4ede1"/>
  <g fill="none" stroke="#3b3b3b" stroke-width="5" stroke-linejoin="miter">
    <rect x="60" y="95" width="780" height="450"/>
    <line x1="60" y1="320" x2="450" y2="320"/>
    <line x1="450" y1="95" x2="450" y2="545"/>
    <line x1="640" y1="320" x2="840" y2="320"/>
  </g>
  <g font-size="18" fill="#888">
    <text x="255" y="195" text-anchor="middle">Wohnzimmer</text>
    <text x="255" y="445" text-anchor="middle">Kueche</text>
    <text x="645" y="195" text-anchor="middle">Schlafzimmer</text>
    <text x="740" y="445" text-anchor="middle">Bad</text>
    <text x="545" y="445" text-anchor="middle">Flur</text>
  </g>

  <!-- Marker: Lampe Wohnzimmer (an, gelb) -->
  <g transform="translate(255 170)">
    <circle r="22" fill="rgba(255,255,255,0.9)" stroke="#fdd835" stroke-width="2"/>
    <path d="M-7 -8a7 7 0 0 1 14 0v3a7 7 0 0 1-2 5v2h-10v-2a7 7 0 0 1-2-5z M-4 4h8v3h-8z" fill="#fdd835"/>
    <text x="0" y="38" text-anchor="middle" font-size="10" fill="#212121">Stehlampe</text>
  </g>

  <!-- Marker: TV-Schalter (aus, grau) -->
  <g transform="translate(345 130)">
    <circle r="20" fill="rgba(255,255,255,0.9)"/>
    <rect x="-9" y="-5" width="18" height="10" rx="5" fill="#9e9e9e"/>
    <circle cx="-4" cy="0" r="3" fill="#fff"/>
    <text x="0" y="33" text-anchor="middle" font-size="10" fill="#212121">TV</text>
  </g>

  <!-- Marker: Kueche-Lampe (aus, grau) -->
  <g transform="translate(255 420)">
    <circle r="22" fill="rgba(255,255,255,0.9)"/>
    <path d="M-7 -8a7 7 0 0 1 14 0v3a7 7 0 0 1-2 5v2h-10v-2a7 7 0 0 1-2-5z M-4 4h8v3h-8z" fill="#9e9e9e"/>
    <text x="0" y="38" text-anchor="middle" font-size="10" fill="#212121">Kueche Decke</text>
  </g>

  <!-- Marker: Bewegungsmelder (aktiv, gelb) -->
  <g transform="translate(550 380)">
    <circle r="20" fill="rgba(255,255,255,0.9)"/>
    <circle r="7" fill="#fdd835"/>
    <text x="0" y="33" text-anchor="middle" font-size="10" fill="#212121">Bewegung Flur</text>
  </g>

  <!-- Marker: Rolladen West (offen, gelb) -->
  <g transform="translate(720 170)">
    <circle r="20" fill="rgba(255,255,255,0.9)"/>
    <g fill="#fdd835">
      <rect x="-10" y="-8" width="20" height="3"/>
      <rect x="-10" y="-3" width="20" height="2"/>
      <rect x="-10" y="6" width="20" height="3"/>
    </g>
    <text x="0" y="33" text-anchor="middle" font-size="10" fill="#212121">Rolladen West</text>
  </g>

  <!-- Marker: Temperatursensor (kein icon, nur Wert) -->
  <g transform="translate(800 470)">
    <circle r="22" fill="rgba(255,255,255,0.9)"/>
    <text x="0" y="4" text-anchor="middle" font-size="12" font-weight="600" fill="#212121">21.5 °C</text>
    <text x="0" y="38" text-anchor="middle" font-size="10" fill="#212121">Temperatur Bad</text>
  </g>

  <!-- Marker: Kamera (blau) -->
  <g transform="translate(545 290)">
    <circle r="20" fill="rgba(255,255,255,0.9)"/>
    <path d="M-9 -3l16 4-1 3-6-1.5-2 5-3-2-4-1z M-8 6h16v2h-16z" fill="#039be5"/>
    <text x="0" y="33" text-anchor="middle" font-size="10" fill="#212121">Kamera Flur</text>
  </g>
</svg>
