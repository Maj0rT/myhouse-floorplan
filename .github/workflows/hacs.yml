name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Wochentlich, damit aenderungen an HACS-anforderungen mitgekriegt werden
    - cron: '0 4 * * 1'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: plugin
